# ==============================================================================
# GOLANG STARTER KIT - MODULE GENERATOR MANIFEST EXAMPLES
# ==============================================================================
# File ini berisikan contoh manifes YAML untuk pembuatan modul menggunakan generator.
# Simpan file manifest Anda di folder: manifests/<nama_modul>.yaml (contoh: manifests/product.yaml)
# Dan jalankan perintah: task gen product

# ------------------------------------------------------------------------------
# CONTOH 1: Standard CRUD Module (Entity + Migration SQL + Repository + Usecase + Controller)
# ------------------------------------------------------------------------------
name: Product
type: standard          # Opsi: standard (default) / business
transactions: true      # Opsi: true/false. Menjalankan database writes dalam Database Transaction
tests: false            # Opsi: true/false. Otomatis membuat file unit test
fields:
  - name: title
    type: string
    required: true
  - name: price
    type: float64
    required: true
  - name: stock
    type: int
    required: true
  - name: published_at
    type: time.Time       # Tipe waktu (Bisa 'time' atau 'time.Time'). Auto import package time
    required: false
  - name: status
    type: string
    sql_type: "ENUM('DRAFT', 'PUBLISHED', 'ARCHIVED')"
    required: true

# ------------------------------------------------------------------------------
# CONTOH 2: Business Action Module (Proses Bisnis Tanpa Entity / Migration Database Sendiri)
# Catatan: `fields` pada modul bisnis dipetakan sebagai payload input/output API (DTO ProcessRequest & ProcessResponse).
