root = "."
tmp_dir = "tmp"

[build]
  # Build command (untuk Windows outputnya .exe)
  cmd = "go build -o ./tmp/main.exe ./cmd/main.go"
  bin = "./tmp/main.exe"
  
  # Delay sebelum restart (ms)
  delay = 1000
  
  # Direktori yang diabaikan agar tidak memicu reload
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git", "docs", "bin"]
  
  # File regex yang diabaikan (misalnya file test)
  exclude_regex = ["_test.go"]
  
  # Ekstensi file yang akan dipantau perubahannya
  include_ext = ["go", "tpl", "tmpl", "html", "env", "json", "yml"]
  
  # Stop build jika ada error kompilasi
  stop_on_error = true
  
  # Kirim interrupt signal (SIGINT) saat mematikan proses lama
  send_interrupt = true
  kill_delay = "500ms"

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = true

[misc]
  clean_on_exit = true
