version: "3"

tasks:
  dev:
    desc: Run the application with hot reload
    cmds:
      - air

  build:
    desc: Build the application
    cmds:
      - go build -o bin/app cmd/main.go

  test:
    desc: Run tests with coverage report
    cmds:
      - gotestsum --format pkgname -- -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  lint-arch:
    desc: Run Architecture Linter to enforce clean architecture rules
    cmds:
      - go run ./cmd/lint

  doctor:
    desc: Run Starter Kit Doctor environment diagnostic check
    cmds:
      - go run ./cmd/doctor

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  init:
    desc: Install DX dependencies (run this once)
    cmds:
      - go install github.com/air-verse/air@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install github.com/swaggo/swag/cmd/swag@latest
      - go install -tags 'mysql' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - go install gotest.tools/gotestsum@latest


  docs:
    desc: Generate swagger OpenAPI documentation
    cmds:
      - swag init -g cmd/main.go --parseInternal --parseDependency

  gen:
    desc: Generate a new CRUD module from manifest (e.g. task gen name=product)
    vars:
      name: '{{.name | default ""}}'
    cmds:
      - go run ./cmd/gen "{{.name}}"

  make-seeder:
    desc: Generate a new database seeder for a table (e.g. task make-seeder name=product)
    vars:
      name: '{{.name | default ""}}'
    cmds:
      - go run ./cmd/gen --make-seeder "{{.name}}"

  make-factory:
    desc: Generate a new data factory for a table (e.g. task make-factory name=product)
    vars:
      name: '{{.name | default ""}}'
    cmds:
      - go run ./cmd/gen --make-factory "{{.name}}"

  make-migration:
    desc: Buat file SQL migration baru (.up.sql dan .down.sql), contoh - task make-migration name=change_publish_year_type
    vars:
      name: '{{.name | default ""}}'
    cmds:
      - go run ./cmd/gen --make-migration "{{.name}}"

  rm:
    desc: Remove a generated CRUD module
    vars:
      name: '{{.name | default ""}}'
      file: '{{.file | default ""}}'
      dry: '{{.dry | default "false"}}'
    cmds:
      - go run cmd/rm/main.go --name "{{.name}}" {{if eq .dry "true"}}--dry-run{{end}}

  gokit-new:
    desc: Scaffold a new project
    vars:
      name: '{{.name | default ""}}'
      file: '{{.file | default ""}}'
    cmds:
      - go run cmd/new/main.go "{{.name}}"

  seed:
    desc: Populate database with test seed data (e.g. task seed count=50)
    vars:
      count: '{{.count | default ""}}'
    cmds:
      - go run cmd/seed/main.go {{if .count}}count={{.count}}{{end}}

  migrate-create:
    desc: Buat file SQL migration baru (.up.sql dan .down.sql), contoh - task migrate-create name=add_phone_to_users
    vars:
      name: '{{.name | default ""}}'
      file: '{{.file | default ""}}'
    cmds:
      - go run ./cmd/gen --make-migration "{{.name}}"

  migrate-up:
    desc: Jalankan semua migration yang belum diterapkan
    cmds:
      - go run cmd/migrate/main.go up

  migrate-down:
    desc: Rollback 1 migration terakhir
    cmds:
      - go run cmd/migrate/main.go down

  migrate-version:
    desc: Tampilkan versi migration saat ini
    cmds:
      - go run cmd/migrate/main.go version

  migrate-force:
    desc: Paksa versi migration ke versi tertentu (berguna jika dirty)
    vars:
      version: '{{.version | default ""}}'
    cmds:
      - go run cmd/migrate/main.go force "{{.version}}"

  migrate-fresh:
    desc: Drop semua tabel, re-apply semua migration dari awal, dan jalankan seeder
    cmds:
      - go run cmd/migrate/main.go fresh
      - go run cmd/seed/main.go

  help:
    desc: Tampilkan dokumentasi lengkap untuk semua perintah task runner
    cmds:
      - |
        echo "=========================================================================="
        echo "                     GOLANG STARTER KIT TASK RUNNER HELP                  "
        echo "=========================================================================="
        echo ""
        echo "DEVELOPMENT COMMANDS:"
        echo "  task dev                       Jalankan server dengan hot reload (Air)"
        echo "  task build                     Compile binary release ke bin/app"
        echo "  task test                      Jalankan unit testing & coverage report"
        echo "  task lint                      Jalankan linter checker (golangci-lint)"
        echo "  task fmt                       Format kode Go agar rapi"
        echo "  task docs                      Generate swagger API documentation"
        echo ""
        echo "CODE GENERATION COMMANDS:"
        echo "  task gen name=product          Generate module CRUD + Migration + Seeder + Factory"
        echo "  task make-migration name=xxx   Buat file SQL migration baru"
        echo "  task make-seeder name=product  Generate Seeder (db/seed/product_seeder.go)"
        echo "  task make-factory name=product Generate Factory (db/factory/product_factory.go)"
        echo "  task rm name=Product           Hapus module Product secara permanen"
        echo ""
        echo "DATABASE & SEEDER COMMANDS:"
        echo "  task migrate-up                Terapkan semua skema migration baru"
        echo "  task migrate-down              Rollback 1 file migration terakhir"
        echo "  task migrate-fresh             Reset DB, re-apply migrasi dari awal & seed"
        echo "  task migrate-version           Tampilkan versi database saat ini"
        echo "  task seed                      Isi database dengan data seeder awal"
        echo "=========================================================================="



